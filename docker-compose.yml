version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: bovweight_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bovweight
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: bovweight_user
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # ML Microservice (Flask + YOLOv8)
  ml-service:
    build: 
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: bovweight_ml
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
    volumes:
      - ./ml-service:/app

volumes:
  db_data:
